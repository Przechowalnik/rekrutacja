name: Playwright Tests

on:
  push:
    branches: [main]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: Test

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL }}
      UPSTASH_REDIS_TOKEN: ${{ secrets.UPSTASH_REDIS_TOKEN }}
      POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
      FACEBOOK_CLIENT_ID: ${{ secrets.FACEBOOK_CLIENT_ID }}
      FACEBOOK_CLIENT_SECRET: ${{ secrets.FACEBOOK_CLIENT_SECRET }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      FACEBOOK_REDIRECT_URL: ${{ secrets.FACEBOOK_REDIRECT_URL }}
      FAKTUROWNIA_API: ${{ secrets.FAKTUROWNIA_API }}
      FAKTUROWNIA_TOKEN: ${{ secrets.FAKTUROWNIA_TOKEN }}
      FAKTUROWNIA_SENDER_NAME: ${{ secrets.FAKTUROWNIA_SENDER_NAME }}
      FAKTUROWNIA_SENDER_TAX_ID: ${{ secrets.FAKTUROWNIA_SENDER_TAX_ID }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GOOGLE_RECAPTCHA_BACKEND: ${{ secrets.GOOGLE_RECAPTCHA_BACKEND }}
      GUS_USER_KEY: ${{ secrets.GUS_USER_KEY }}
      HOSTED_SMS_API: ${{ secrets.HOSTED_SMS_API }}
      HOSTED_SMS_EMAIL: ${{ secrets.HOSTED_SMS_EMAIL }}
      HOSTED_SMS_PASSWORD: ${{ secrets.HOSTED_SMS_PASSWORD }}
      HOSTED_SMS_SENDER: ${{ secrets.HOSTED_SMS_SENDER }}
      LOCAL_ENV: ${{ secrets.LOCAL_ENV }}
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
      BREVO_EMAIL_SENDER: ${{ secrets.BREVO_EMAIL_SENDER }}
      BREVO_SENDER_NAME: ${{ secrets.BREVO_SENDER_NAME }}
      OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
      OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
      OAUTH_REDIRECT_URL: ${{ secrets.OAUTH_REDIRECT_URL }}
      VITE_CREATE_OR_LOGIN_COMPANY: ${{ secrets.VITE_CREATE_OR_LOGIN_COMPANY }}
      VITE_FREE_LISTINGS: ${{ secrets.VITE_FREE_LISTINGS }}
      VITE_GOOGLE_RECAPTCHA_FRONTEND: ${{ secrets.VITE_GOOGLE_RECAPTCHA_FRONTEND }}
      VITE_SHOW_DEVELOPMENT_HELPERS: ${{ secrets.VITE_SHOW_DEVELOPMENT_HELPERS }}
      VITE_STRIPE_PUBLIC_KEY: ${{ secrets.VITE_STRIPE_PUBLIC_KEY }}
      VITE_TEST_INVOICES: ${{ secrets.VITE_TEST_INVOICES }}
      VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}
      VERCEL_URL: ${{ secrets.VERCEL_URL }}
      VERCEL_ENV: ${{ secrets.VERCEL_ENV }}
      VITE_IS_E2E: "true"
      E2E: "true"
      NODE_ENV: test
      CI: "true"

    steps:
      - name: 🧩 Checkout repository
        uses: actions/checkout@v4

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: npm

      - name: 🔎 Versions
        run: |
          node -v
          npm -v

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps

      - name: 🧱 Generate Prisma Client
        run: npx prisma generate

      - name: 🧮 Type check (TypeScript)
        run: npm run check-types

      - name: 🧹 Lint check (ESLint)
        run: npm run check-lint

      - name: 🪧 CSpell check
        run: npm run check-cspell

      - name: 🔨 Build application
        run: npm run build

      - name: 🚀 Run Playwright tests
        run: npm run test:e2e

      - name: 📊 Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  deploy-migrations:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment: Production

    env:
      DATABASE_URL: ${{ secrets.POSTGRES_URL_NON_POOLING }}
      POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}

    steps:
      - name: 🧩 Checkout repository
        uses: actions/checkout@v4

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.0
          cache: npm

      - name: 🔎 Versions
        run: |
          node -v
          npm -v

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧱 Run Prisma migrations on PRODUCTION
        run: npx prisma migrate deploy
